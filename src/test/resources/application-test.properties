spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.web=INFO
logging.level.taltech.ee.FinalThesis=INFO

# test-only secrets — never used in prod
jwt.secret=test-secret-key-min-32-chars-long-for-hs256-aaaaaa
openai.api-key=test-openai-key

# datasource is wired by @ServiceConnection; do NOT set spring.datasource.* here
